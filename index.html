<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <title>Browser Calculator</title>
        <link rel="stylesheet" href="style.css">
        <script defer src="script.js"></script>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
    </head>
    <body>
        <div id="container">
            <div id="display-container">
                <div id="display-previous" class="display"></div>
                <div id="display-current" class="display"></div>
            </div>
            <div id="buttons-container">
                <button data-value="%" class="operator">%</button>
                <button data-value="clear" class="operation">C</button>
                <button data-value="delete" class="operation">DEL</button>
                <button data-value="/" class="operator inverted">/</button>
                <button data-value="7"  class="number">7</button>
                <button data-value="8"  class="number">8</button>
                <button data-value="9"  class="number">9</button>
                <button data-value="*" class="operator inverted">x</button>
                <button data-value="4" class="number">4</button>
                <button data-value="5" class="number">5</button>
                <button data-value="6" class="number">6</button>
                <button data-value="-" class="operator inverted">-</button>
                <button data-value="1" class="number">1</button>
                <button data-value="2" class="number">2</button>
                <button data-value="3" class="number">3</button>
                <button data-value="+" class="operator inverted">+</button>
                <button data-value="0" class="number double">0</button>
                <button data-value="." class="number">.</button>
                <button data-value="operate" class="operation inverted">=</button>
            </div>
        </div>
    </body>
</html>
