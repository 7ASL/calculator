<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <title>Browser Calculator</title>
        <link rel="stylesheet" href="style.css">
        <script defer src="script.js"></script>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
    </head>
    <body>
        <div id="container">
            <div id="display-container">
                <div id="display-previous" class="display"></div>
                <div id="display-current" class="display"></div>
            </div>
            <div id="buttons-container">
                <button id="modulo" class="operator">%</button>
                <button id="clear" class="operator">C</button>
                <button id="delete" class="operator">del</button>
                <button id="divide" class="operator inverted">/</button>
                <button id="num7"  class="number">7</button>
                <button id="num8"  class="number">8</button>
                <button id="num9"  class="number">9</button>
                <button id="multiply" class="operator inverted">x</button>
                <button id="num4" class="number">4</button>
                <button id="num5" class="number">5</button>
                <button id="num6" class="number">6</button>
                <button id="subtract" class="operator inverted">-</button>
                <button id="num1" class="number">1</button>
                <button id="num2" class="number">2</button>
                <button id="num3" class="number">3</button>
                <button id="add" class="operator inverted">+</button>
                <button id="num0" class="number">0</button>
                <button id="decimal" class="operator">.</button>
                <button id="operate" class="operator inverted">=</button>
            </div>
        </div>
    </body>
</html>
